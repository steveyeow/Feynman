<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <rect width="1400" height="860" fill="#F6F2EA"/>
  <text x="88" y="92" fill="#171717" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">Knowledge can be organized in two very different ways</text>
  <text x="88" y="132" fill="#5B5B5B" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="24">A designed classification tree versus an emergent semantic space.</text>

  <rect x="74" y="180" width="580" height="602" rx="28" fill="#FBFAF7" stroke="#E6DED2"/>
  <rect x="746" y="180" width="580" height="602" rx="28" fill="#FBFAF7" stroke="#E6DED2"/>

  <text x="112" y="240" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">1. Traditional classification</text>
  <text x="112" y="278" fill="#6A6A6A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="20">Categories come first. Knowledge is sorted into predefined boxes.</text>

  <rect x="292" y="318" width="144" height="42" rx="21" fill="#1F1F1F"/>
  <text x="328" y="346" fill="#F8F5EF" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="20">Knowledge</text>
  <line x1="364" y1="360" x2="364" y2="420" stroke="#7A7A7A" stroke-width="2.5"/>
  <line x1="194" y1="420" x2="534" y2="420" stroke="#7A7A7A" stroke-width="2.5"/>
  <line x1="194" y1="420" x2="194" y2="472" stroke="#7A7A7A" stroke-width="2.5"/>
  <line x1="364" y1="420" x2="364" y2="472" stroke="#7A7A7A" stroke-width="2.5"/>
  <line x1="534" y1="420" x2="534" y2="472" stroke="#7A7A7A" stroke-width="2.5"/>

  <rect x="126" y="472" width="136" height="40" rx="20" fill="#D9E3F0"/>
  <rect x="296" y="472" width="136" height="40" rx="20" fill="#E8DFF2"/>
  <rect x="466" y="472" width="136" height="40" rx="20" fill="#DDEEE6"/>
  <text x="164" y="499" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="19">Science</text>
  <text x="321" y="499" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="19">Humanities</text>
  <text x="512" y="499" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="19">Arts</text>

  <rect x="116" y="572" width="220" height="70" rx="18" fill="#FFFFFF" stroke="#D8D2C8"/>
  <text x="138" y="600" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Information theory</text>
  <text x="138" y="626" fill="#666666" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="17">Touches math, physics, engineering,</text>
  <text x="138" y="648" fill="#666666" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="17">computer science, neuroscience.</text>

  <rect x="386" y="572" width="182" height="70" rx="18" fill="#FFFFFF" stroke="#D8D2C8"/>
  <text x="420" y="600" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Consciousness</text>
  <text x="409" y="626" fill="#666666" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="17">Crosses philosophy, psychology,</text>
  <text x="437" y="648" fill="#666666" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="17">neuroscience, Buddhism.</text>

  <text x="112" y="720" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">Strong for storage and administration.</text>
  <text x="112" y="750" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">Weak at showing overlap, bridges, and continuous transitions.</text>

  <text x="784" y="240" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">2. Embedding space</text>
  <text x="784" y="278" fill="#6A6A6A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="20">Meaning becomes geometry. Knowledge can organize itself by proximity.</text>

  <circle cx="919" cy="410" r="116" fill="#DDE7F3" opacity="0.9"/>
  <circle cx="1100" cy="382" r="108" fill="#E9E0F1" opacity="0.92"/>
  <circle cx="1044" cy="566" r="108" fill="#E1EFE7" opacity="0.94"/>

  <text x="846" y="314" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Physics</text>
  <text x="1040" y="292" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Philosophy</text>
  <text x="1080" y="680" fill="#2A2A2A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="24" font-weight="700">Biology</text>

  <circle cx="857" cy="392" r="9" fill="#2D2D2D"/>
  <circle cx="902" cy="350" r="9" fill="#2D2D2D"/>
  <circle cx="963" cy="410" r="9" fill="#2D2D2D"/>
  <circle cx="905" cy="466" r="9" fill="#2D2D2D"/>

  <circle cx="1052" cy="340" r="9" fill="#2D2D2D"/>
  <circle cx="1127" cy="370" r="9" fill="#2D2D2D"/>
  <circle cx="1086" cy="430" r="9" fill="#2D2D2D"/>
  <circle cx="1165" cy="418" r="9" fill="#2D2D2D"/>

  <circle cx="981" cy="529" r="9" fill="#2D2D2D"/>
  <circle cx="1058" cy="500" r="9" fill="#2D2D2D"/>
  <circle cx="1118" cy="556" r="9" fill="#2D2D2D"/>
  <circle cx="1032" cy="616" r="9" fill="#2D2D2D"/>

  <circle cx="1014" cy="447" r="14" fill="#A8742A"/>
  <text x="1037" y="454" fill="#6B4A14" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Information</text>
  <line x1="1000" y1="437" x2="950" y2="406" stroke="#B28B4A" stroke-width="2.5"/>
  <line x1="1028" y1="436" x2="1074" y2="398" stroke="#B28B4A" stroke-width="2.5"/>
  <line x1="1016" y1="462" x2="1032" y2="518" stroke="#B28B4A" stroke-width="2.5"/>

  <circle cx="1030" cy="492" r="14" fill="#A85A65"/>
  <text x="1053" y="499" fill="#7F3F48" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Consciousness</text>
  <line x1="1042" y1="481" x2="1085" y2="429" stroke="#BB7A83" stroke-width="2.5"/>
  <line x1="1025" y1="506" x2="1038" y2="547" stroke="#BB7A83" stroke-width="2.5"/>

  <text x="784" y="720" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">Clusters, overlaps, and bridges can emerge without being predefined.</text>
  <text x="784" y="750" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">This is why embedding space is closer to a map than a filing cabinet.</text>
</svg>
