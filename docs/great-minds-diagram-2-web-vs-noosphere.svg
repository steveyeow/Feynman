<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <rect width="1400" height="860" fill="#F6F2EA"/>
  <text x="88" y="92" fill="#171717" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="42" font-weight="700">The web links documents. A semantic system can map thought.</text>
  <text x="88" y="132" fill="#5B5B5B" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="24">Graph structure is useful. Semantic geometry adds distance, neighborhoods, and bridges.</text>

  <rect x="74" y="180" width="580" height="602" rx="28" fill="#FBFAF7" stroke="#E6DED2"/>
  <rect x="746" y="180" width="580" height="602" rx="28" fill="#FBFAF7" stroke="#E6DED2"/>

  <text x="112" y="240" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Hyperlink graph</text>
  <text x="112" y="278" fill="#6A6A6A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="20">Pages connect because someone created a link.</text>

  <circle cx="205" cy="396" r="20" fill="#1F1F1F"/>
  <circle cx="334" cy="318" r="20" fill="#1F1F1F"/>
  <circle cx="470" cy="372" r="20" fill="#1F1F1F"/>
  <circle cx="302" cy="506" r="20" fill="#1F1F1F"/>
  <circle cx="514" cy="530" r="20" fill="#1F1F1F"/>
  <circle cx="165" cy="564" r="20" fill="#1F1F1F"/>

  <line x1="220" y1="385" x2="318" y2="329" stroke="#757575" stroke-width="2.5"/>
  <line x1="351" y1="325" x2="452" y2="364" stroke="#757575" stroke-width="2.5"/>
  <line x1="458" y1="388" x2="319" y2="494" stroke="#757575" stroke-width="2.5"/>
  <line x1="321" y1="508" x2="494" y2="528" stroke="#757575" stroke-width="2.5"/>
  <line x1="187" y1="408" x2="172" y2="544" stroke="#757575" stroke-width="2.5"/>

  <rect x="182" y="620" width="350" height="88" rx="18" fill="#FFFFFF" stroke="#D8D2C8"/>
  <text x="206" y="654" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">What it captures well</text>
  <text x="206" y="686" fill="#5E5E5E" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="19">Explicit references, citations, hand-made associations,</text>
  <text x="206" y="712" fill="#5E5E5E" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="19">clear navigable links between documents.</text>

  <text x="112" y="760" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">What it does not naturally encode: semantic distance or latent neighborhood structure.</text>

  <text x="784" y="240" fill="#191919" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Noosphere-shaped semantic map</text>
  <text x="784" y="278" fill="#6A6A6A" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="20">Minds, books, ideas, and conversations share a common space.</text>

  <circle cx="918" cy="405" r="102" fill="#DDE7F3"/>
  <circle cx="1096" cy="366" r="94" fill="#E9E0F1"/>
  <circle cx="1040" cy="542" r="92" fill="#E1EFE7"/>

  <text x="858" y="308" fill="#212121" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Books</text>
  <text x="1055" y="280" fill="#212121" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Ideas</text>
  <text x="1078" y="650" fill="#212121" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="23" font-weight="700">Minds</text>

  <circle cx="872" cy="398" r="10" fill="#1F1F1F"/>
  <circle cx="930" cy="356" r="10" fill="#1F1F1F"/>
  <circle cx="970" cy="424" r="10" fill="#1F1F1F"/>
  <circle cx="915" cy="468" r="10" fill="#1F1F1F"/>

  <circle cx="1064" cy="344" r="10" fill="#1F1F1F"/>
  <circle cx="1119" cy="380" r="10" fill="#1F1F1F"/>
  <circle cx="1075" cy="432" r="10" fill="#1F1F1F"/>
  <circle cx="1150" cy="395" r="10" fill="#1F1F1F"/>

  <circle cx="987" cy="520" r="10" fill="#1F1F1F"/>
  <circle cx="1045" cy="488" r="10" fill="#1F1F1F"/>
  <circle cx="1108" cy="547" r="10" fill="#1F1F1F"/>
  <circle cx="1026" cy="598" r="10" fill="#1F1F1F"/>

  <circle cx="1005" cy="445" r="14" fill="#AF7B32"/>
  <text x="1029" y="451" fill="#6B4A14" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Bridge concept</text>
  <line x1="992" y1="437" x2="945" y2="406" stroke="#B28B4A" stroke-width="2.5"/>
  <line x1="1018" y1="434" x2="1063" y2="396" stroke="#B28B4A" stroke-width="2.5"/>
  <line x1="1008" y1="460" x2="1023" y2="510" stroke="#B28B4A" stroke-width="2.5"/>

  <path d="M846 612 C932 658, 1020 676, 1160 622" stroke="#8B8B8B" stroke-width="2.5" stroke-dasharray="8 8" fill="none"/>
  <text x="886" y="704" fill="#4D4D4D" font-family="Baskerville, Georgia, 'Times New Roman', serif" font-size="21">A shared semantic field makes clusters, distances, and bridges explorable.</text>
</svg>
