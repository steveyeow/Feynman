<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concept 9: "Rooted learner"  book at the base grounds everything.
       Stronger book form, the º rises from the book's spine,
       wavy propagator crowns the top. Slightly shorter legs
       so the book is more prominent. Three layers:
       Book (grounding) ’ Person (learner) ’ Idea (ascending) -->
  <defs>
    <style>
      .ln { fill: none; stroke: #1d1d1f; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .bk { fill: none; stroke: #1d1d1f; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1d1d1f; }
    </style>
  </defs>
  <!-- Book base  open pages -->
  <path class="bk" d="M8,54 C16,48 24,47 32,50"/>
  <path class="bk" d="M56,54 C48,48 40,47 32,50"/>
  <!-- Book spine -->
  <line class="bk" x1="32" y1="50" x2="32" y2="56"/>
  <!-- º legs rising from book spine -->
  <line class="ln" x1="14" y1="52" x2="32" y2="34"/>
  <line class="ln" x1="50" y1="52" x2="32" y2="34"/>
  <!-- Central vertex -->
  <circle class="dot" cx="32" cy="34" r="3"/>
  <!-- Wavy propagator  knowledge ascending -->
  <path class="ln" d="M32,34 C27,28 37,22 32,16 C27,10 37,4 32,0"/>
  <!-- Small dot at the top  the spark -->
  <circle class="dot" cx="32" cy="0" r="2"/>
</svg>
