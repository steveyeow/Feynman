<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concept 1: Feynman Diagram  two vertices connected by a wavy propagator,
       with straight fermion lines extending outward. The wavy line represents
       the exchange of knowledge/ideas between minds. -->
  <defs>
    <style>
      .line { fill: none; stroke: #1d1d1f; stroke-width: 2.5; stroke-linecap: round; }
      .dot { fill: #1d1d1f; }
      .wave { fill: none; stroke: #1d1d1f; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>
  <!-- Left vertex incoming lines -->
  <line class="line" x1="6" y1="12" x2="18" y2="28"/>
  <line class="line" x1="6" y1="52" x2="18" y2="36"/>
  <!-- Left vertex dot -->
  <circle class="dot" cx="18" cy="32" r="3"/>
  <!-- Wavy propagator (knowledge exchange) -->
  <path class="wave" d="M18,32 C22,26 26,38 30,32 C34,26 38,38 42,32 C46,26 46,32 46,32"/>
  <!-- Right vertex dot -->
  <circle class="dot" cx="46" cy="32" r="3"/>
  <!-- Right vertex outgoing lines -->
  <line class="line" x1="46" y1="32" x2="58" y2="12"/>
  <line class="line" x1="46" y1="32" x2="58" y2="52"/>
</svg>
