<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concept 4: Speech bubble whose tail morphs into a Feynman diagram.
       A rounded speech bubble shape at top, with the tail becoming
       wavy and straight particle lines  conversation generating ideas. -->
  <defs>
    <style>
      .stroke { fill: none; stroke: #1d1d1f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #1d1d1f; }
    </style>
  </defs>
  <!-- Speech bubble outline -->
  <path class="stroke" d="M12,8 h32 a6,6 0 0 1 6,6 v16 a6,6 0 0 1 -6,6 h-14 l-6,8 -2,-8 h-10 a6,6 0 0 1 -6,-6 v-16 a6,6 0 0 1 6,-6 z"/>
  <!-- Inside the bubble: a mini Feynman diagram -->
  <!-- Left vertex -->
  <circle class="fill" cx="22" cy="22" r="2.5"/>
  <!-- Wavy propagator inside bubble -->
  <path class="stroke" d="M22,22 C26,17 30,27 34,22 C38,17 42,27 44,22"/>
  <!-- Right vertex -->
  <circle class="fill" cx="44" cy="22" r="2.5"/>
  <!-- Lines radiating from left vertex -->
  <line class="stroke" x1="22" y1="22" x2="16" y2="14"/>
  <line class="stroke" x1="22" y1="22" x2="16" y2="30"/>
  <!-- Lines radiating from right vertex -->
  <line class="stroke" x1="44" y1="22" x2="48" y2="14"/>
  <line class="stroke" x1="44" y1="22" x2="48" y2="30"/>
</svg>
