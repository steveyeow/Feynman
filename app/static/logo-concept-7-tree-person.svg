<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concept 7: More tree-like  the ¤ trunk splits into branches above
       Two fermion lines from below (¤), vertex in the middle,
       then TWO wavy propagators branch upward like a tree crown
       Plus subtle book curves at bottom -->
  <defs>
    <style>
      .ln { fill: none; stroke: #1d1d1f; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1d1d1f; }
    </style>
  </defs>
  <!-- ¤ legs -->
  <line class="ln" x1="10" y1="60" x2="32" y2="34"/>
  <line class="ln" x1="54" y1="60" x2="32" y2="34"/>
  <!-- Central vertex / trunk node -->
  <circle class="dot" cx="32" cy="34" r="3.2"/>
  <!-- Left branch: wavy propagator -->
  <path class="ln" d="M32,34 C28,28 22,30 18,24 C14,18 20,16 16,10"/>
  <!-- Right branch: wavy propagator -->
  <path class="ln" d="M32,34 C36,28 42,30 46,24 C50,18 44,16 48,10"/>
  <!-- Branch-end dots (fruits of knowledge / minds) -->
  <circle class="dot" cx="16" cy="10" r="2.5"/>
  <circle class="dot" cx="48" cy="10" r="2.5"/>
  <!-- Book page curves -->
  <path class="ln" d="M10,60 C16,56 24,55 32,57" style="stroke-width:1.5"/>
  <path class="ln" d="M54,60 C48,56 40,55 32,57" style="stroke-width:1.5"/>
</svg>
