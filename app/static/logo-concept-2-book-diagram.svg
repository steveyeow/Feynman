<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Concept 2: Open book whose pages morph into Feynman diagram lines.
       The book spine is the vertex, and wavy/straight lines radiate out
       like particle interactions  knowledge radiating from books. -->
  <defs>
    <style>
      .stroke { fill: none; stroke: #1d1d1f; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #1d1d1f; }
    </style>
  </defs>
  <!-- Book spine / central vertex -->
  <line class="stroke" x1="32" y1="52" x2="32" y2="32"/>
  <circle class="dot" cx="32" cy="32" r="3"/>
  <!-- Left page becoming a straight particle line -->
  <line class="stroke" x1="32" y1="32" x2="8" y2="14"/>
  <!-- Right page becoming a straight particle line -->
  <line class="stroke" x1="32" y1="32" x2="56" y2="14"/>
  <!-- Wavy propagator going upward  idea being transmitted -->
  <path class="stroke" d="M32,32 C28,24 36,20 32,12 C28,4 36,0 32,-4"/>
  <!-- Small dots at line ends  minds/ideas -->
  <circle class="dot" cx="8" cy="14" r="2.5"/>
  <circle class="dot" cx="56" cy="14" r="2.5"/>
  <!-- Subtle book curve hints -->
  <path class="stroke" d="M32,52 C24,48 14,46 8,48" style="stroke-width:1.8"/>
  <path class="stroke" d="M32,52 C40,48 50,46 56,48" style="stroke-width:1.8"/>
</svg>
